port=0

# Interface física real do seu Precision onde o cabo está conectado
interface=enp62s0u1u2

# Escopo DHCP condizente com a sub-rede 192.168.1.0/24 da placa enp62s0u1u2
dhcp-range=192.168.1.200,192.168.1.220,255.255.255.0,1h

dhcp-boot=vmlinuses

enable-tftp
tftp-root=/var/lib/tftpboot

log-dhcp
log-queries