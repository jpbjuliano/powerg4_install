# _-_-_-_-_-_-_-_-_ CONFIGURAÇÕES DE LOCALIDADE _-_-_-_-_-_-_-_-_
d-i debian-installer/locale string pt_BR.UTF-8
d-i keyboard-configuration/xkb-keymap select br

# _-_-_-_-_-_-_-_-_ CONFIGURAÇÃO DE CONTAS E SENHAS _-_-_-_-_-_-_-_-_
# Configuração da conta Root
d-i passwd/root-login boolean true
d-i passwd/root-password password 123
d-i passwd/root-password-again password 123

# Configuração do usuário padrão (j)
d-i passwd/user-fullname string Juca
d-i passwd/username string j
d-i passwd/user-password password 123
d-i passwd/user-password-again password 123
d-i passwd/user-default-groups string audio cdrom video sudo dip plugdev netdev

# _-_-_-_-_-_-_-_-_ CONFIGURAÇÃO DE REDE E REPOSITÓRIO _-_-_-_-_-_-_-_-_
d-i netcfg/choose_interface select auto

 Mirror oficial Debian Ports — testado e confirmado HTTP 200
d-i mirror/country string manual
d-i mirror/http/hostname string ftp.ports.debian.org
d-i mirror/http/directory string /debian-ports/
d-i mirror/codename string unstable
d-i mirror/suite string unstable

# Componentes necessários para firmware legado do G4
d-i mirror/components multiselect main, contrib, non-free, non-free-firmware

# Permite assinaturas não verificadas (chave GPG do ports às vezes expira)
d-i debian-installer/allow_unauthenticated boolean true

# Ignora avisos de assinaturas inválidas/expiradas do Ports no primeiro estágio
d-i debian-installer/allow_unauthenticated boolean true

# _-_-_-_-_-_-_-_-_ PARTICIONAMENTO AUTOMÁTICO (Apple Partition Map) _-_-_-_-_-_-_-_-_
d-i partman-auto/disk string /dev/sda
d-i partman-auto/method string regular
d-i partman-auto/choose_recipe select atomic
d-i partman/confirm_write_new_label boolean true
d-i partman/choose_partition select finish
d-i partman/confirm boolean true
d-i partman/confirm_nochanges boolean true

# _-_-_-_-_-_-_-_-_ SELEÇÃO E INSTALAÇÃO DE PACOTES _-_-_-_-_-_-_-_-_
# Define a instalação do ambiente MATE (leve e compatível com placas antigas do G4)
tasksel tasksel/first multiselect desktop, mate-desktop, standard

# Pacotes adicionais necessários para o ecossistema PowerPC
d-i pkgsel/include string debian-ports-archive-keyring openssh-server

# _-_-_-_-_-_-_-_-_ FINALIZAÇÃO DA INSTALAÇÃO _-_-_-_-_-_-_-_-_
# Força a instalação do gerenciador de boot correto para OpenFirmware
d-i grub-installer/only_debian boolean true
d-i grub-installer/with_other_os boolean false

# Reinicia automaticamente após a conclusão
d-i finish-install/reboot_in_progress note